name: Release

on:
  push:
    tags:
      - 'pbplugin/v[0-9]+.[0-9]+.[0-9]+'
      - 'plugincmd/v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect module from tag
        id: module
        run: |
          MODULE="${GITHUB_REF_NAME%%/*}"
          echo "go_mod=${MODULE}/go.mod" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ steps.module.outputs.go_mod }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
